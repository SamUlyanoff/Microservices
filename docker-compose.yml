version: '3.8'

services:
  #TODO: разобраться с KAFKA
  postgres:
    image: postgres:16-alpine
    container_name: postgres-db
    environment:
      POSTGRES_DB: microservicesDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data #том для сохранения данных контейнером
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongodb:
    image: mongo:7.0
    container_name: mongo-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: microservicesDB
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet -u admin -p password --authenticationDatabase admin --eval 'db.runCommand({ping:1})'"]
      interval: 5s
      timeout: 3s
      retries: 5

  #TODO: объявить в переменной environment подключения к БД (postgres, mongodb)
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8090:8090"
    networks:
      - microservices-network

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8091:8091"
    networks:
      - microservices-network
    depends_on:
      postgres:
        condition: service_healthy

  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    container_name: inventory-service
    ports:
      - "8092:8092"
    networks:
      - microservices-network
    depends_on:
      postgres:
        condition: service_healthy

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "8093:8093"
    networks:
      - microservices-network
    depends_on:
      mongodb:
        condition: service_healthy

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "8094:8094"
    networks:
      - microservices-network
    depends_on:
      postgres:
        condition: service_healthy

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: product-service
    ports:
      - "8095:8095"
    networks:
      - microservices-network
    depends_on:
      mongodb:
        condition: service_healthy

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8096:8096"
    networks:
      - microservices-network
    depends_on:
      postgres:
        condition: service_healthy

networks:
  microservices-network:
    driver: bridge

volumes:
  postgres-data:
  mongo-data: